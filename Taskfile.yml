version: '3'

vars:
  DIST_DIR: dist
  OUTPUT_DIR: '~/Downloads/video-transcripts'

tasks:
  dev:
    desc: Start the MCP server with hot reload
    cmds:
      - bun --watch run src/index.ts

  check-deps:
    desc: Check if required system dependencies are installed
    cmds:
      - |
        echo "Checking system dependencies..."
        command -v yt-dlp >/dev/null 2>&1 && echo "✓ yt-dlp installed" || echo "✗ yt-dlp missing (brew install yt-dlp)"
        command -v whisper-cli >/dev/null 2>&1 && echo "✓ whisper.cpp (whisper-cli) installed" || echo "✗ whisper-cli missing (brew install whisper-cpp)"
        command -v ffmpeg >/dev/null 2>&1 && echo "✓ ffmpeg installed" || echo "✗ ffmpeg missing (brew install ffmpeg)"

  download-models:
    desc: "Download whisper.cpp ggml models (usage: task download-models -- base | all)"
    cmds:
      - bash scripts/download-models.sh {{.CLI_ARGS | default "base"}}

  install:
    desc: Install dependencies
    cmds:
      - bun install

  link:
    desc: Link package globally for local testing
    deps: [build]
    cmds:
      - npm link

  unlink:
    desc: Unlink globally linked package
    cmds:
      - npm unlink -g video-transcriber-mcp

  build:
    desc: Build the project
    cmds:
      - bun run build

  conformance:
    desc: "Verify the TS MCP tool contract still matches the Rust source of truth"
    deps: [build]
    cmds:
      - node scripts/conformance.mjs

  release:
    desc: "Tag & GitHub-release the current package.json version (CI then publishes to npm)"
    cmds:
      - |
        set -e
        VERSION=$(node -p "require('./package.json').version")
        TAG="v${VERSION}"
        if git rev-parse "$TAG" >/dev/null 2>&1 || gh release view "$TAG" >/dev/null 2>&1; then
          echo "❌ $TAG already exists — bump the version first (npm version patch|minor|major)."
          exit 1
        fi
        echo "🔎 Type-checking before release..."
        npm run check
        NOTES=$(mktemp)
        awk -v ver="$VERSION" '$0 ~ ("^## " ver) {f=1; print; next} /^## [0-9]/ {f=0} f {print}' CHANGELOG.md > "$NOTES"
        [ -s "$NOTES" ] || echo "⚠️  No CHANGELOG entry for $VERSION — release notes will be empty."
        echo "🚀 Creating GitHub release $TAG..."
        gh release create "$TAG" --title "$TAG" --notes-file "$NOTES"
        rm -f "$NOTES"
        echo "✅ $TAG released — the 'Publish to npm' workflow will publish it. Watch it with: gh run watch"

  publish:
    desc: "Manual publish to npm (fallback — normally 'task release' + CI handles this)"
    deps: [build]
    cmds:
      - bun publish

  publish-dry:
    desc: Dry run publish (see what would be published)
    deps: [build]
    cmds:
      - npm publish --dry-run
